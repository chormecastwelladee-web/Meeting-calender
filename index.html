<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ปฏิทินของฉัน · Google Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EDE7DA;
    --paper-dark: #E2DACB;
    --ink: #232320;
    --ink-soft: #55524A;
    --muted: #8B8577;
    --pine: #2F5233;
    --pine-soft: #3F6A45;
    --brick: #C0392B;
    --line: rgba(35,35,32,0.14);
    --radius: 18px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper-dark);
    color: var(--ink);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px 14px 60px;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(35,35,32,0.06) 1px, transparent 1px);
    background-size: 14px 14px;
  }

  .sheet {
    width: 100%;
    max-width: 760px;
  }

  /* ---------- Ring binding header ---------- */
  .binding {
    display: flex;
    justify-content: space-evenly;
    padding: 0 18px;
    margin-bottom: -14px;
    position: relative;
    z-index: 2;
  }
  .ring {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--paper-dark);
    border: 3px solid var(--ink);
    box-shadow: inset 0 2px 3px rgba(0,0,0,0.35);
  }

  .card {
    background: var(--paper);
    border-radius: var(--radius);
    padding: 34px 22px 22px;
    box-shadow: 0 18px 40px rgba(35,35,32,0.18), 0 2px 0 rgba(35,35,32,0.06);
    position: relative;
    overflow: hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height: 8px;
    background: var(--pine);
  }

  /* ---------- Hero: torn month tab + big date ---------- */
  .hero {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 4px 22px;
    border-bottom: 2px dashed var(--line);
    margin-bottom: 20px;
  }

  .hero-left { display:flex; align-items:flex-end; gap:16px; }

  .day-badge {
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    padding: 6px 14px 10px;
    text-align: center;
    min-width: 74px;
    transform: rotate(-2deg);
    box-shadow: 3px 4px 0 rgba(0,0,0,0.15);
  }
  .day-badge .num {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 40px;
    line-height: 1;
    display:block;
  }
  .day-badge .weekday {
    font-size: 11px;
    letter-spacing: .12em;
    opacity: .8;
  }

  .month-title {
    font-family: 'IBM Plex Sans Thai', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--ink);
    margin: 0 0 2px;
  }
  .month-title .eng {
    display:block;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 14px;
    color: var(--muted);
    margin-top: 2px;
  }

  .zoom-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .zoom-btn {
    border: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
    border-radius: 999px;
    width: 36px;
    height: 36px;
    font-size: 17px;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s, color .15s, transform .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .zoom-btn:hover { background: var(--ink); color: var(--paper); }
  .zoom-btn:active { transform: scale(0.92); }
  .zoom-pct {
    font-size: 12px;
    color: var(--muted);
    min-width: 38px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Calendar embed area ---------- */
  .cal-wrap {
    border-radius: 12px;
    overflow: auto;
    border: 1px solid var(--line);
    background: #fff;
    position: relative;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x pan-y;
  }
  .cal-scale-outer {
    position: relative;
    overflow: visible;
  }
  .cal-scale-inner {
    transform-origin: top left;
  }
  iframe#gcal {
    display: block;
    border: 0;
    pointer-events: auto;
  }

  .empty-state {
    padding: 46px 20px;
    text-align: center;
    color: var(--ink-soft);
  }
  .empty-state .pin {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--brick);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 18px;
    margin-bottom: 14px;
    box-shadow: 0 3px 6px rgba(192,57,43,0.4);
  }
  .empty-state h3 {
    font-family: 'IBM Plex Sans Thai', sans-serif;
    margin: 0 0 8px;
    font-size: 17px;
    color: var(--ink);
  }
  .empty-state p { margin: 0 0 18px; font-size: 14px; line-height: 1.6; }
  .empty-state button {
    background: var(--pine);
    color: #fff;
    border: 0;
    padding: 11px 22px;
    border-radius: 999px;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  .empty-state button:active { transform: scale(0.97); }

  /* footer note strip */
  .note-strip {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    color: var(--muted);
    padding: 0 4px;
  }
  .note-strip .dot { width:6px; height:6px; border-radius:50%; background: var(--pine-soft); flex-shrink:0; }

</style>
</head>
<body>

  <div class="sheet">
    <div class="binding">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    </div>

    <div class="card">
      <div class="hero">
        <div class="hero-left">
          <div class="day-badge">
            <span class="num" id="heroDay">--</span>
            <span class="weekday" id="heroWeekday">-</span>
          </div>
          <div>
            <p class="month-title" id="heroMonthTh">กำลังโหลด…</p>
            <span class="eng" id="heroMonthEn"></span>
          </div>
        </div>

        <div class="zoom-controls">
          <button class="zoom-btn" id="zoomOut" aria-label="ซูมออก">−</button>
          <span class="zoom-pct" id="zoomPct">100%</span>
          <button class="zoom-btn" id="zoomIn" aria-label="ซูมเข้า">+</button>
        </div>
      </div>

      <div class="cal-wrap" id="calWrap">
        <div class="cal-scale-outer" id="calScaleOuter">
          <div class="cal-scale-inner" id="calScaleInner">
            <iframe id="gcal" width="800" height="600" frameborder="0" scrolling="no"></iframe>
          </div>
        </div>
      </div>

      <div class="note-strip" id="noteStrip">
        <span class="dot"></span>
        <span>ใช้ปุ่ม + / − เพื่อซูมปฏิทิน แล้วเลื่อนนิ้วภายในกรอบเพื่อดูส่วนอื่น</span>
      </div>
    </div>
  </div>

<script>
  const THAI_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const THAI_WEEKDAYS = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"];
  const ENG_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  const CALENDAR_ID = "fo.welladee@gmail.com";

  const els = {
    heroDay: document.getElementById('heroDay'),
    heroWeekday: document.getElementById('heroWeekday'),
    heroMonthTh: document.getElementById('heroMonthTh'),
    heroMonthEn: document.getElementById('heroMonthEn'),
    calWrap: document.getElementById('calWrap'),
    calScaleOuter: document.getElementById('calScaleOuter'),
    calScaleInner: document.getElementById('calScaleInner'),
    gcal: document.getElementById('gcal'),
    zoomIn: document.getElementById('zoomIn'),
    zoomOut: document.getElementById('zoomOut'),
    zoomPct: document.getElementById('zoomPct'),
  };

  function renderHero() {
    const now = new Date();
    els.heroDay.textContent = now.getDate();
    els.heroWeekday.textContent = THAI_WEEKDAYS[now.getDay()];
    els.heroMonthTh.textContent = `${THAI_MONTHS[now.getMonth()]} ${now.getFullYear() + 543}`;
    els.heroMonthEn.textContent = `${ENG_MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  }

  function buildEmbedUrl(calId) {
    const params = new URLSearchParams({
      src: calId,
      ctz: "Asia/Bangkok",
      mode: "MONTH",
      showTitle: "0",
      showNav: "1",
      showPrint: "0",
      showTabs: "0",
      showCalendars: "0",
      showTz: "0",
    });
    return `https://calendar.google.com/calendar/embed?${params.toString()}`;
  }

  const BASE_W = 800;
  const BASE_H = 600;

  // zoomFactor is a multiplier applied on top of the "fit width" base scale.
  // 1.0 = fits the container width exactly (previous default behavior).
  const ZOOM_MIN = 0.6;
  const ZOOM_MAX = 2.5;
  const ZOOM_STEP = 0.15;
  let zoomFactor = 1.0;
  let baseFitScale = 1.0;

  function computeBaseFitScale() {
    const containerWidth = els.calWrap.clientWidth;
    return containerWidth / BASE_W;
  }

  function applyScale() {
    const scale = baseFitScale * zoomFactor;
    els.calScaleInner.style.transform = `scale(${scale})`;
    els.calScaleOuter.style.width = `${BASE_W * scale}px`;
    els.calScaleOuter.style.height = `${BASE_H * scale}px`;
    els.zoomPct.textContent = `${Math.round(zoomFactor * 100)}%`;
    els.zoomIn.disabled = zoomFactor >= ZOOM_MAX - 0.001;
    els.zoomOut.disabled = zoomFactor <= ZOOM_MIN + 0.001;
  }

  function fitScale() {
    baseFitScale = computeBaseFitScale();
    applyScale();
  }

  function setZoom(newZoom) {
    zoomFactor = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newZoom));
    applyScale();
  }

  els.zoomIn.addEventListener('click', () => setZoom(zoomFactor + ZOOM_STEP));
  els.zoomOut.addEventListener('click', () => setZoom(zoomFactor - ZOOM_STEP));

  // Ctrl/Cmd + wheel zoom for desktop trackpads (pinch on trackpad fires wheel with ctrlKey)
  els.calWrap.addEventListener('wheel', (e) => {
    if (!e.ctrlKey) return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
    setZoom(zoomFactor + delta);
  }, { passive: false });

  // Double-tap / double-click to toggle between fit (1.0) and a closer zoom (1.6)
  let lastTap = 0;
  els.calWrap.addEventListener('dblclick', () => {
    setZoom(zoomFactor > 1.2 ? 1.0 : 1.6);
  });
  els.calWrap.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTap < 300) {
      setZoom(zoomFactor > 1.2 ? 1.0 : 1.6);
    }
    lastTap = now;
  });

  window.addEventListener('resize', fitScale);

  function showCalendar() {
    els.gcal.src = buildEmbedUrl(CALENDAR_ID);
    requestAnimationFrame(fitScale);
  }

  renderHero();
  showCalendar();
</script>

</body>
</html>
